<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Not Supported</title>
    <!--
        浏览器能力不足时的兜底页面。
        如果目标网站有自己的 unsupported 页面，可以直接替换这个文件。
    -->
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #111;
            color: #eee;
            font-family: Arial, "Microsoft YaHei", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
        }
    </style>
</head>
<body>
    <h1>当前浏览器不支持这个页面需要的能力</h1>
</body>
</html>
